<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tech-Pro+ CRM</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--surface3:#2a2f45;
  --border:#2e3350;--border2:#3a4060;
  --accent:#4f8ef7;--accent2:#3a6fd4;--accent-glow:rgba(79,142,247,.15);
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.12);
  --text:#e8eaf6;--text2:#8892b0;--text3:#4a5280;
  --radius:10px;--radius-lg:16px;
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
#sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-logo .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-bottom:10px;color:#fff}
nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);border-color:rgba(79,142,247,.25)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:999px;font-size:10px;padding:1px 6px;font-weight:600}
.sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--surface2)}
.user-avatar{width:28px;height:28px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.user-info p{font-size:12px;font-weight:600;color:var(--text)}
.user-info span{font-size:10px;color:var(--text3)}
/* Main content */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.topbar h2{font-size:16px;font-weight:700;color:var(--text)}
.topbar p{font-size:12px;color:var(--text2);margin-top:1px}
.topbar-actions{display:flex;gap:8px}
.page{flex:1;overflow-y:auto;padding:20px 24px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none;font-family:var(--font);white-space:nowrap}
.btn svg{width:14px;height:14px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--surface3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.btn-green:hover{background:rgba(34,197,94,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-value{font-size:26px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
/* Forms */
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);transition:border .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
input::placeholder{color:var(--text3)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* Tables */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(79,142,247,.04)}
/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-gray{background:var(--surface3);color:var(--text2)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:700}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px;display:flex}
.modal-close:hover{color:var(--text);background:var(--surface2)}
/* Alerts */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-red{background:var(--red-bg);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.alert-green{background:var(--green-bg);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.alert-amber{background:var(--amber-bg);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
/* POS specific */
.pos-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;height:100%;min-height:0}
.pos-left{display:flex;flex-direction:column;gap:12px;min-height:0}
.pos-right{display:flex;flex-direction:column;gap:12px}
.cart-wrap{flex:1;overflow:hidden;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);display:flex;flex-direction:column}
.cart-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.cart-body{flex:1;overflow-y:auto}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);gap:8px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.cart-item-desc{flex:1;min-width:0}
.cart-item-desc p{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-desc span{font-size:11px;color:var(--text3)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:all .1s}
.qty-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-num{width:28px;text-align:center;font-weight:700;font-size:13px}
.cart-total-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.total-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--text2)}
.total-row.grand{font-size:16px;font-weight:800;color:var(--text);padding-top:8px;margin-top:6px;border-top:1px solid var(--border2)}
.scan-bar{display:flex;gap:8px;align-items:center}
.scan-bar input{font-family:var(--mono);font-size:13px;background:var(--surface2);border-color:var(--accent);letter-spacing:.5px}
.scan-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Status pipeline */
.pipeline{display:flex;gap:0;margin-bottom:16px;overflow-x:auto}
.pipeline-step{flex:1;min-width:80px;text-align:center;padding:8px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:3px solid var(--border);color:var(--text3);cursor:default}
.pipeline-step.done{border-color:var(--green);color:var(--green)}
.pipeline-step.active{border-color:var(--accent);color:var(--accent)}
/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:18px}
.tab{flex:1;text-align:center;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
/* Search bar */
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1}
/* Misc */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.text-right{text-align:right}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-amber{color:var(--amber)}
.text-accent{color:var(--accent)}
.text-muted{color:var(--text2)}
.font-mono{font-family:var(--mono)}
.font-bold{font-weight:700}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.flex{display:flex}
.items-center{align-items:center}
.gap-2{gap:8px}
.gap-3{gap:12px}
.flex-1{flex:1}
.w-full{width:100%}
/* Print invoice */
@media print{
  body *{visibility:hidden}
  #print-area,#print-area *{visibility:visible}
  #print-area{position:fixed;top:0;left:0;width:100%;background:#fff;color:#000;padding:30px;font-family:'Arial',sans-serif}
  .no-print{display:none!important}
}
#print-area{display:none}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">MS</div>
      <h1>Mobile Shop CRM</h1>
      <p id="shop-name-display">Your Shop</p>
    </div>
    <nav id="nav">
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-item" onclick="showPage('pos')" id="nav-pos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Point of Sale
      </div>
      <div class="nav-item" onclick="showPage('repairs')" id="nav-repairs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        Repairs
        <span class="nav-badge" id="repair-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="showPage('inventory')" id="nav-inventory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Inventory
        <span class="nav-badge" id="stock-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="showPage('customers')" id="nav-customers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Customers
      </div>
      <div class="nav-item" onclick="showPage('reports')" id="nav-reports">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Reports
      </div>
      <div class="nav-item" onclick="showPage('cashup')" id="nav-cashup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/><path d="M6 11h4M6 15h4M14 11h4M14 15h4"/></svg>
        Cash-Up
      </div>
      <div class="nav-item" onclick="showPage('refunds')" id="nav-refunds">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Refunds
      </div>
      <div class="nav-item" onclick="showPage('staff')" id="nav-staff">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        Staff / PINs
      </div>
      <div class="nav-item" onclick="showPage('audit')" id="nav-audit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        Audit Log
      </div>
      <div class="nav-item" onclick="showPage('settings')" id="nav-settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        Settings
      </div>
      <div class="nav-item" onclick="manualSync()" id="nav-sync" title="Sync with cloud now">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        ☁️ Sync
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <p>Admin</p>
          <span style='font-size:9px;letter-spacing:.5px'>TECH-PRO+ ADMIN</span>
        </div>
      </div>
      <button onclick="manualSync()" style="margin-top:8px;width:100%;background:none;border:1px solid var(--border2);border-radius:8px;padding:7px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--text2)'">
        ⟳ Sync Now
      </button>
      <button onclick="if(settings.pinLocked){pinLogin()}else{alert('PIN lock is disabled. Enable it in Staff page to require login.')}" style="margin-top:6px;width:100%;background:none;border:1px solid var(--border2);border-radius:8px;padding:7px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--text2)'">
        🔒 Switch User
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div class="topbar">
      <div>
        <h2 id="page-title">Dashboard</h2>
        <p id="page-sub">Welcome back — here's today's overview</p>
      </div>
      <!-- Global instant customer search -->
      <div style="position:relative;flex:1;max-width:300px;margin:0 24px">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="global-cust-search" placeholder="Quick search customer (name or phone)…"
          style="padding-left:32px;background:var(--surface2);border-color:var(--border2);font-size:12px"
          oninput="globalCustomerSearch(this.value)"
          onblur="setTimeout(()=>document.getElementById('global-search-results').innerHTML='',200)"
          autocomplete="off"/>
        <div id="global-search-results" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:200;max-height:280px;overflow-y:auto"></div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="page" id="page-content"></div>
  </div>
</div>

<!-- Print area -->
<div id="print-area"></div>

// CLOUD CONFIG — Supabase
// Fill these in from your Supabase project dashboard.
// Settings → API → Project URL and anon/public key.
// Leave blank to run in offline/local mode only.
// ══════════════════════════════════════════════════════════
// Supabase credentials are stored in localStorage so the Settings page
// can actually save them — they are NOT hardcoded constants anymore.
// (Previously these were `const` values requiring manual file editing,
// which is why pasting credentials into Settings appeared to do nothing.)
function getSupabaseUrl(){ return localStorage.getItem('mshop_supabase_url') || ''; }
function getSupabaseAnon(){ return localStorage.getItem('mshop_supabase_anon') || ''; }
function setSupabaseCredentials(url, anon){
  localStorage.setItem('mshop_supabase_url', (url||'').trim());
  localStorage.setItem('mshop_supabase_anon', (anon||'').trim());
}

// IMPORTANT: this is named `supabaseClient`, NOT `supabase`, on purpose.
// The Supabase UMD library attaches itself to `window.supabase` when it
// loads from the CDN. If our own code also declared a global variable
// named `supabase` (as an earlier version of this file did), the two
// can collide depending on script load timing — sometimes causing the
// library's global to appear "missing" even though it loaded fine.
// Keeping our variable name completely different avoids that entirely.
let supabaseClient = null;
let cloudMode = false;

async function initCloud(){
  const url = getSupabaseUrl();
  const anon = getSupabaseAnon();

  if(!url || !anon){ showCloudBanner('offline'); return; }

  // Cloud sync needs to load the Supabase library from a CDN, which most
  // browsers block or heavily restrict when a page is opened directly as
  // a local file (file://...html) instead of through a real web address
  // (http:// or https://). This is the #1 cause of cryptic "Script error"
  // / "failed to load from CDN" messages — not a credentials problem.
  if(location.protocol === 'file:'){
    showCloudBanner('error',
      'This file is open directly from disk (file://), which most browsers block from loading cloud libraries. ' +
      'Cloud sync needs the file served over http/https. See the "Cloud sync isn\'t working?" help button below for two easy fixes.'
    );
    return;
  }

  // Basic format validation — catches the most common copy-paste mistakes
  // (pasting the wrong field, trailing slashes, missing https://, etc.)
  if(!/^https:\/\/[a-z0-9-]+\.supabase\.co\/?$/i.test(url)){
    showCloudBanner('error', `Project URL looks wrong: "${url}". It should look like https://abcdefgh.supabase.co with no extra path.`);
    return;
  }
  // Supabase now issues two possible key formats depending on when the
  // project was created: the legacy JWT-style anon key (starts "eyJ...")
  // or the newer publishable key (starts "sb_publishable_..."). Both are
  // valid public keys — only reject something that matches neither AND
  // looks nothing like either pattern, so we don't block a real key.
  const looksLikeLegacyJWT = anon.startsWith('eyJ');
  const looksLikePublishable = anon.startsWith('sb_publishable_');
  if(!looksLikeLegacyJWT && !looksLikePublishable){
    showCloudBanner('error', `Anon key format not recognized. It should start with either "eyJ" (older projects) or "sb_publishable_" (newer projects). Check you copied the "anon public" / "publishable" key from Settings → API, not the secret/service_role key.`);
    return;
  }
  // The secret/service_role key should never be used in browser-side code —
  // catch this specific, very common mistake with a clear message instead
  // of letting it fail as a generic 401 later.
  if(anon.startsWith('sb_secret_') || /service_role/i.test(anon)){
    showCloudBanner('error', `This looks like a SECRET key, not the public anon/publishable key. Never use the secret key in a browser app — go to Settings → API and copy the "anon public" or "publishable" key instead.`);
    return;
  }

  try {
    // Try the simple, officially-documented jsDelivr URL first, then fall
    // back to unpkg and a pinned-version jsDelivr URL if that's blocked.
    // The previous deep-path URL (.../dist/umd/supabase.min.js) is more
    // fragile — it can 404 on some package versions — so it's now last.
    await loadScript([
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
      'https://unpkg.com/@supabase/supabase-js@2',
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
    ]);

    // In rare cases the script's onload event can fire one tick before the
    // UMD bundle finishes attaching window.supabase. Give it a brief moment
    // and check a few times before giving up, rather than failing instantly.
    let attempts = 0;
    while(!window.supabase && attempts < 10){
      await new Promise(r=>setTimeout(r,50));
      attempts++;
    }
    if(!window.supabase){ throw new Error('Supabase library loaded but window.supabase is missing — this can happen if a browser extension or ad-blocker stripped the script. Try disabling ad-blockers for this page.'); }

    supabaseClient = window.supabase.createClient(url.replace(/\/$/,''), anon);

    // Test connection against each required table individually so we can
    // tell the user exactly which table is missing, instead of one vague
    // failure. This is the #1 reason sync silently fails: the SQL setup
    // script wasn't run, or was only partially run.
    //
    // IMPORTANT: check authentication failures FIRST, before the generic
    // "permission denied" text match. Postgres surfaces invalid/rejected
    // API keys as a plain "permission denied" message too — it does NOT
    // always mention JWT or auth explicitly — so a message-text-only check
    // was previously misclassifying a rejected anon key as an RLS policy
    // problem, sending people to fix the wrong thing entirely.
    const requiredTables = ['crm_settings','crm_products','crm_customers','crm_repairs','crm_invoices'];
    const missingTables = [];
    for(const t of requiredTables){
      const { error, status } = await supabaseClient.from(t).select('id').limit(1);
      if(error){
        const isAuthFailure = status === 401 || status === 403 && /JWT|api key|invalid/i.test(error.message)
          || error.code === 'PGRST301' || /JWT|invalid api key|invalid_token/i.test(error.message);
        // 42P01 = undefined_table in Postgres
        if(error.code === '42P01' || /does not exist/i.test(error.message)){
          missingTables.push(t);
        } else if(isAuthFailure){
          throw new Error(`Your anon key was rejected (HTTP ${status||'?'}) — Supabase error: "${error.message}". This means the key itself is wrong, expired, or doesn't match this project — it is NOT a Row Level Security / policy problem. Go to Supabase → Settings → API and copy the "anon public" key again carefully (watch for trailing spaces or a partial copy), then click Save & Connect again.`);
        } else if(/permission denied|RLS/i.test(error.message)){
          throw new Error(`Permission denied on table "${t}" — Row Level Security policy is blocking access. Re-run the SQL setup script's CREATE POLICY lines. (${error.message})`);
        } else {
          throw new Error(`Error on table "${t}" (HTTP ${status||'?'}): ${error.message}`);
        }
      }
    }
    if(missingTables.length){
      throw new Error(`Missing table(s): ${missingTables.join(', ')}. Go to Supabase → SQL Editor and run the setup script from Settings → Cloud Sync again — it likely didn't complete.`);
    }

    cloudMode = true;
    showCloudBanner('online');
    await syncFromCloud();
    subscribeRealtime();
    addAudit && addAudit('CLOUD','Connected to Supabase successfully');
  } catch(e){
    cloudMode = false;
    console.error('[Cloud] init failed:', e);
    showCloudBanner('error', e.message || String(e));
  }
}

/**
 * Runs a live diagnostic against the configured Supabase project and
 * shows the RAW error response from PostgREST — not our own wrapped
 * message — since the raw response often contains details (error code,
 * hint, exact role) that pin down issues a generic message can't.
 */
async function runCloudDiagnostic(){
  const url = getSupabaseUrl();
  const anon = getSupabaseAnon();
  const resultEl = document.getElementById('diagnostic-result');
  if(resultEl) resultEl.innerHTML = '<p style="color:var(--text2)">Running diagnostic…</p>';

  if(!url || !anon){
    if(resultEl) resultEl.innerHTML = '<div class="alert alert-red">No credentials saved yet — enter your URL and key above first.</div>';
    return;
  }

  let report = [];
  report.push(`<strong>Project URL:</strong> ${escH(url)}`);
  report.push(`<strong>Anon key (first 20 chars):</strong> ${escH(anon.slice(0,20))}...`);

  try {
    // Call the REST endpoint directly with fetch — bypasses our own
    // wrapping entirely so we see exactly what Supabase itself returns.
    //
    // Header handling differs by key format: legacy JWT-style anon keys
    // (eyJ...) are expected on BOTH the apikey header and the
    // Authorization: Bearer header. But the newer publishable key format
    // (sb_publishable_...) must go on the apikey header ONLY — if it's
    // also sent on Authorization: Bearer, Supabase's gateway tries to
    // parse it as a JWT, fails, and returns 401 even though the key
    // itself is completely valid. This exact mismatch is a documented,
    // common cause of "key looks right but still gets 401".
    const isPublishableKey = anon.startsWith('sb_publishable_');
    const headers = isPublishableKey
      ? { 'apikey': anon }
      : { 'apikey': anon, 'Authorization': `Bearer ${anon}` };

    const resp = await fetch(`${url.replace(/\/$/,'')}/rest/v1/crm_settings?select=id&limit=1`, { headers });
    const body = await resp.json().catch(()=>null);
    report.push(`<strong>Key format detected:</strong> ${isPublishableKey?'New publishable key (apikey header only)':'Legacy JWT anon key (apikey + Bearer headers)'}`);
    report.push(`<strong>HTTP Status:</strong> ${resp.status} ${resp.statusText}`);
    if(body){
      report.push(`<strong>Raw response:</strong><pre style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:10px;font-size:11px;overflow-x:auto;margin-top:6px">${escH(JSON.stringify(body,null,2))}</pre>`);
    }
    if(resp.status === 200){
      report.push('<div class="alert alert-green mt-2">✅ This table is reachable with your anon key right now. If the app still shows an error, click "Save & Connect" again to retest, or refresh this page.</div>');
    } else if(resp.status === 401){
      report.push('<div class="alert alert-red mt-2">401 Unauthorized — your anon key is being rejected. Double-check you copied the "anon public" key from Settings → API, not the service_role key, and that there are no extra spaces.</div>');
    } else if(resp.status === 404){
      report.push('<div class="alert alert-red mt-2">404 Not Found — either the table "crm_settings" does not exist in this project, or the Project URL is pointing at the wrong project. Double check both in Supabase → Settings → API.</div>');
    } else if(resp.status === 403 || (body && /permission denied/i.test(JSON.stringify(body)))){
      report.push('<div class="alert alert-red mt-2">Permission denied confirmed directly from Supabase. This means a policy genuinely is not in place on this exact table in this exact project. Run the diagnostic SQL query below in your SQL Editor to see what policies actually exist right now.</div>');
    }
  } catch(e){
    report.push(`<div class="alert alert-red mt-2">Network-level error: ${escH(e.message)}. This usually means the Project URL is wrong/unreachable, or the request was blocked (CORS, ad-blocker, or firewall).</div>`);
  }

  report.push(`
    <p style="margin-top:14px;font-weight:700;color:var(--text)">Run this in Supabase SQL Editor to see what's actually configured:</p>
    <pre id="diag-sql" style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:10px;font-size:11px;overflow-x:auto;margin-top:6px">SELECT schemaname, tablename, policyname, roles, cmd
FROM pg_policies WHERE tablename = 'crm_settings';

SELECT schemaname, tablename, rowsecurity
FROM pg_tables WHERE tablename = 'crm_settings';</pre>
    <button class="btn btn-secondary btn-sm mt-2" onclick="navigator.clipboard.writeText(document.getElementById('diag-sql').textContent);this.textContent='✓ Copied!';setTimeout(()=>this.textContent='Copy SQL',2000)">Copy SQL</button>
  `);

  if(resultEl) resultEl.innerHTML = report.join('<div style="margin:8px 0"></div>');
}

/**
 * Focused fix for "permission denied for table X" / RLS errors.
 *
 * The most common cause: the setup SQL was run more than once, and
 * `CREATE POLICY` has no "IF NOT EXISTS" option in Postgres — so the
 * second run hit "policy already exists" on an early table and the
 * whole script aborted right there, leaving later tables with RLS
 * turned on but no policy at all (which is exactly "permission denied").
 *
 * This snippet is safe to run any number of times: it drops each policy
 * first (ignoring "doesn't exist" errors) before recreating it.
 */
function showPolicyFixHelp(){
  const sql = `-- Safe to run as many times as needed.
DROP POLICY IF EXISTS "allow_all" ON crm_settings;
DROP POLICY IF EXISTS "allow_all" ON crm_products;
DROP POLICY IF EXISTS "allow_all" ON crm_customers;
DROP POLICY IF EXISTS "allow_all" ON crm_repairs;
DROP POLICY IF EXISTS "allow_all" ON crm_invoices;

ALTER TABLE crm_settings  ENABLE ROW LEVEL SECURITY;
ALTER TABLE crm_products  ENABLE ROW LEVEL SECURITY;
ALTER TABLE crm_customers ENABLE ROW LEVEL SECURITY;
ALTER TABLE crm_repairs   ENABLE ROW LEVEL SECURITY;
ALTER TABLE crm_invoices  ENABLE ROW LEVEL SECURITY;

CREATE POLICY "allow_all" ON crm_settings  FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON crm_products  FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON crm_customers FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON crm_repairs   FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON crm_invoices  FOR ALL USING (true) WITH CHECK (true);`;

  const html = `
  <div style="font-size:13px;line-height:1.7;color:var(--text2)">
    <div class="alert alert-amber mb-3">
      This almost always happens when the setup SQL was run more than once. In Postgres, <code>CREATE POLICY</code> has no "if not exists" option — so re-running the original script can fail partway through and leave some tables with security turned on but no permission rule at all. That's what "permission denied" means here.
    </div>
    <p style="margin-bottom:8px">This version is safe to run <strong>any number of times</strong> — it removes each old rule first, then adds it back fresh:</p>
    <pre id="policy-fix-sql" style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:12px;font-size:11px;color:#a8d8a8;overflow-x:auto;line-height:1.6;white-space:pre">${sql}</pre>
    <button class="btn btn-primary btn-sm mt-2" onclick="
      navigator.clipboard.writeText(document.getElementById('policy-fix-sql').textContent);
      this.textContent='✓ Copied!';setTimeout(()=>this.textContent='Copy SQL',2000)">
      Copy SQL
    </button>
    <ol style="padding-left:18px;margin-top:14px">
      <li>Go to your Supabase project → <strong>SQL Editor</strong> → New query</li>
      <li>Paste the SQL above → click <strong>Run</strong></li>
      <li>Come back here and click <strong>"Save & Connect"</strong> again</li>
    </ol>
  </div>`;
  openModal('Fix "Permission Denied" Error', html, '<button class="btn btn-secondary" onclick="closeModal()">Close</button>', true);
}

/**
 * Loads an external script, trying multiple CDN mirrors in order.
 * Accepts either a single URL (string) or an array of fallback URLs —
 * if the first CDN is blocked (corporate firewall, ad-blocker, or some
 * `file://`-protocol restrictions in certain browsers), it automatically
 * tries the next one instead of failing outright.
 */
function loadScript(srcOrList){
  const list = Array.isArray(srcOrList) ? srcOrList : [srcOrList];
  return new Promise((resolve, reject) => {
    let i = 0;
    function tryNext(){
      if(i >= list.length){ reject(new Error('All CDN sources failed to load: '+list.join(', '))); return; }
      const src = list[i++];
      if(document.querySelector(`script[src="${src}"]`)){ resolve(); return; }
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => resolve();
      s.onerror = () => { s.remove(); tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  });
}

// ── Supabase table helpers ─────────────────────────────────
// Each table has: id (text PK), data (jsonb), updated_at (timestamptz)
// Simple key-value approach — one row per entity or one row per collection.

async function cloudGet(table, id){
  if(!cloudMode) return null;
  const { data, error } = await supabaseClient.from(table).select('data').eq('id',id).single();
  if(error) return null;
  return data?.data ?? null;
}

async function cloudSet(table, id, val){
  if(!cloudMode) return;
  await supabaseClient.from(table).upsert({ id, data: val, updated_at: new Date().toISOString() });
}

async function cloudGetAll(table){
  if(!cloudMode) return null;
  const { data, error } = await supabaseClient.from(table).select('data');
  if(error || !data) return null;
  return data.map(r=>r.data);
}

async function cloudSetAll(table, arr){
  if(!cloudMode || !arr) return;
  // Upsert all rows. Each item must have an `id` field.
  const rows = arr.map(item=>({ id:item.id, data:item, updated_at:new Date().toISOString() }));
  if(rows.length) await supabaseClient.from(table).upsert(rows);
}

// ── Real-time subscriptions ────────────────────────────────
function subscribeRealtime(){
  if(!cloudMode) return;
  // Listen for changes to customers, invoices, repairs — instant across devices
  ['crm_customers','crm_invoices','crm_repairs'].forEach(table=>{
    supabaseClient.channel(table)
      .on('postgres_changes', { event:'*', schema:'public', table }, async ()=>{
        showCloudBanner('syncing');
        await syncFromCloud();
        showCloudBanner('online');
        if(currentPage==='dashboard'||currentPage==='customers'||currentPage==='repairs'){
          renderPage(currentPage);
        }
      })
      .subscribe();
  });
}

// ── Full sync: cloud → local ───────────────────────────────
async function syncFromCloud(){
  try {
    const [cs, prods, custs, reps, invs, sets] = await Promise.all([
      cloudGetAll('crm_settings'),
      cloudGetAll('crm_products'),
      cloudGetAll('crm_customers'),
      cloudGetAll('crm_repairs'),
      cloudGetAll('crm_invoices'),
      cloudGet('crm_settings','__settings__'),
    ]);
    if(sets){ Object.assign(settings, sets); DB.set('settings', settings); }
    if(prods && prods.length){ products=prods; DB.set('products',products); }
    if(custs && custs.length){ customers=custs; DB.set('customers',customers); }
    if(reps  && reps.length) { repairs=reps;   DB.set('repairs',repairs); }
    if(invs  && invs.length) { invoices=invs;  DB.set('invoices',invoices); }
    updateBadges();
  } catch(e){ console.warn('Sync error:', e); }
}

// ── Save wrapper: local + cloud ────────────────────────────
function save(key, val){
  DB.set(key, val);
  if(!cloudMode) return;
  const tableMap = {
    settings: async ()=>{ await cloudSet('crm_settings','__settings__', val); },
    products:  async ()=>{ await cloudSetAll('crm_products', val); },
    customers: async ()=>{ await cloudSetAll('crm_customers', val); },
    repairs:   async ()=>{ await cloudSetAll('crm_repairs', val); },
    invoices:  async ()=>{ await cloudSetAll('crm_invoices', val); },
  };
  if(tableMap[key]) tableMap[key]().catch(e=>console.warn('Cloud save error:',e));
}

// ── Cloud manual sync button ───────────────────────────────
async function manualSync(){
  if(!cloudMode){ alert('Cloud not configured. Go to Settings → Cloud to set up Supabase.'); return; }
  showCloudBanner('syncing');
  await syncFromCloud();
  showCloudBanner('online');
  renderPage(currentPage);
}

// ══════════════════════════════════════════════════════════
// LOCAL STORAGE LAYER (offline fallback)
// ══════════════════════════════════════════════════════════
const DB = {
  get(key){ try{ return JSON.parse(localStorage.getItem('mshop_'+key)||'null') }catch{return null} },
  set(key,val){ localStorage.setItem('mshop_'+key,JSON.stringify(val)) },
  init(key,def){ if(!this.get(key)) this.set(key,def); return this.get(key) }
};

// ══════════════════════════════════════════════════════════
// UNIQUE INVOICE NUMBER SYSTEM
// Format: PREFIX-YYYY-NNNN  e.g.  INV-2025-0042
// Guaranteed unique: sequential counter stored in settings,
// never reused, visible year prefix for filing.
// ══════════════════════════════════════════════════════════
function generateInvoiceNumber(){
  const year = new Date().getFullYear();
  // Reset counter if fiscal year changed
  if(settings._invoiceYear !== year){
    settings._invoiceYear = year;
    settings.nextInvoice = 1;
  }
  const num = String(settings.nextInvoice).padStart(4,'0');
  settings.nextInvoice++;
  DB.set('settings', settings);
  if(cloudMode) cloudSet('crm_settings','__settings__', settings).catch(()=>{});
  return `${settings.invoicePrefix}-${year}-${num}`;
}

// ══════════════════════════════════════════════════════════
// CANADIAN TAX TABLE (2024 rates)
// GST = federal 5% always applied on top of pre-tax price
// PST / QST = provincial, varies by province
// HST provinces (ON, NB, NS, NL, PE) combine both into one rate
// ══════════════════════════════════════════════════════════
const CA_PROVINCES = {
  // Province: { label, taxType, gst, pst, hst }
  // taxType: 'HST' = single harmonised, 'GST+PST' = two separate lines, 'GST' = federal only
  'AB': { label:'Alberta (AB)',           taxType:'GST',     gst:5,    pst:0,    hst:0  },
  'BC': { label:'British Columbia (BC)',  taxType:'GST+PST', gst:5,    pst:7,    hst:0  },
  'MB': { label:'Manitoba (MB)',          taxType:'GST+PST', gst:5,    pst:7,    hst:0  },
  'NB': { label:'New Brunswick (NB)',     taxType:'HST',     gst:0,    pst:0,    hst:15 },
  'NL': { label:'Newfoundland (NL)',      taxType:'HST',     gst:0,    pst:0,    hst:15 },
  'NS': { label:'Nova Scotia (NS)',       taxType:'HST',     gst:0,    pst:0,    hst:15 },
  'NT': { label:'Northwest Territories', taxType:'GST',     gst:5,    pst:0,    hst:0  },
  'NU': { label:'Nunavut',               taxType:'GST',     gst:5,    pst:0,    hst:0  },
  'ON': { label:'Ontario (ON)',           taxType:'HST',     gst:0,    pst:0,    hst:13 },
  'PE': { label:'P.E.I. (PE)',           taxType:'HST',     gst:0,    pst:0,    hst:15 },
  'QC': { label:'Quebec (QC)',           taxType:'GST+QST', gst:5,    pst:9.975,hst:0  },
  'SK': { label:'Saskatchewan (SK)',      taxType:'GST+PST', gst:5,    pst:6,    hst:0  },
  'YT': { label:'Yukon',                 taxType:'GST',     gst:5,    pst:0,    hst:0  },
};

/**
 * Calculate Canadian taxes on a taxable amount.
 * Returns { gst, pst, hst, totalTax, total, lines[] }
 * lines[] is what prints on the invoice — e.g. ['GST 5% $x', 'PST 7% $x']
 */
function calcCanadianTax(taxable, provinceCode){
  const p = CA_PROVINCES[provinceCode] || CA_PROVINCES['ON'];
  const r = n => Math.round(n * 100) / 100;
  if(p.taxType === 'HST'){
    const hst = r(taxable * p.hst / 100);
    return { gst:0, pst:0, hst, totalTax:hst, total:taxable+hst,
      lines:[{ label:`HST ${p.hst}%`, amount:hst }] };
  }
  if(p.taxType === 'GST+PST'){
    const gst = r(taxable * p.gst / 100);
    const pst = r(taxable * p.pst / 100);
    return { gst, pst, hst:0, totalTax:gst+pst, total:taxable+gst+pst,
      lines:[{ label:`GST ${p.gst}%`, amount:gst }, ...(p.pst?[{ label:`PST ${p.pst}%`, amount:pst }]:[]) ] };
  }
  if(p.taxType === 'GST+QST'){
    const gst = r(taxable * p.gst / 100);
    // QST is applied on the pre-tax amount (not on top of GST) in Quebec
    const qst = r(taxable * p.pst / 100);
    return { gst, pst:qst, hst:0, totalTax:gst+qst, total:taxable+gst+qst,
      lines:[{ label:`GST ${p.gst}%`, amount:gst }, { label:`QST ${p.pst}%`, amount:qst }] };
  }
  // GST only (AB, NT, NU, YT)
  const gst = r(taxable * p.gst / 100);
  return { gst, pst:0, hst:0, totalTax:gst, total:taxable+gst,
    lines:[{ label:`GST ${p.gst}%`, amount:gst }] };
}

function addAudit(action, detail, userId){
  auditLog.push({
    id:uid(), ts:new Date().toISOString(),
    action, detail,
    staffId: userId||settings.currentStaffId,
    staffName: (staff.find(s=>s.id===(userId||settings.currentStaffId))||{name:'System'}).name
  });
  if(auditLog.length>500) auditLog=auditLog.slice(-500);
  save('auditLog',auditLog);
}

function currentStaff(){
  return staff.find(s=>s.id===settings.currentStaffId)||{name:'Owner',role:'owner',id:'s1'};
}
function hasRole(...roles){
  const r=currentStaff().role;
  return roles.includes(r)||r==='owner';
}
function checkPin(pin){
  return staff.find(s=>s.pin===pin&&s.active);
}
function pinLogin(){
  if(!settings.pinLocked) return; // PIN disabled
  const html=`
  <div style="text-align:center;padding:10px 0">
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px">Enter your staff PIN</div>
    <div id="pin-display" style="font-size:32px;font-weight:800;letter-spacing:8px;color:var(--accent);margin-bottom:20px;min-height:40px">____</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(n=>`
        <button onclick="pinKey('${n}')" style="padding:14px;font-size:18px;font-weight:700;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);cursor:pointer" ${n===''?'disabled style="opacity:0;cursor:default"':''}>
          ${n}
        </button>`).join('')}
    </div>
    <div id="pin-error" style="color:var(--red);font-size:12px;margin-top:12px"></div>
  </div>`;
  openModal('Staff Login',html,'',false);
}
let pinBuffer='';
function pinKey(k){
  if(k==='⌫'){ pinBuffer=pinBuffer.slice(0,-1); }
  else if(k!==''){ pinBuffer+=String(k); }
  const d=document.getElementById('pin-display');
  if(d) d.textContent=pinBuffer.replace(/./g,'●').padEnd(4,'_');
  if(pinBuffer.length===4){
    const found=checkPin(pinBuffer);
    if(found){
      settings.currentStaffId=found.id;
      settings._sessionStart=Date.now();
      DB.set('settings',settings);
      addAudit('LOGIN',`Staff login: ${found.name}`,found.id);
      pinBuffer='';
      closeModal();
      if(typeof updateStaffDisplay==='function') updateStaffDisplay();
      showPage('dashboard');
    } else {
      const e=document.getElementById('pin-error');
      if(e) e.textContent='Incorrect PIN. Try again.';
      setTimeout(()=>{ pinBuffer=''; if(d) d.textContent='____'; if(e) e.textContent=''; },1200);
    }
  }
}

// STORE CREDIT HELPERS
// ══════════════════════════════════════════════════════════
function issueStoreCredit(customerId, amount, reason){
  const c=customers.find(x=>x.id===customerId);
  if(!c) return;
  c.storeCredit=(c.storeCredit||0)+amount;
  save('customers',customers);
  addAudit('STORE_CREDIT',`Issued ${fmt(amount)} store credit to ${c.name} — ${reason}`);
  invoices.push({
    id:uid(), number:'SC-'+uid().slice(3,9).toUpperCase(), date:today(),
    type:'STORE_CREDIT_ISSUED',
    customerId, customerName:c.name, customerPhone:c.phone||'',
    amount, reason, createdAt:new Date().toISOString(),
    lines:[{name:`Store Credit — ${reason}`,qty:1,price:amount,sku:'SC'}],
    subtotal:amount, discount:0, tax:0, taxLines:[], totalTax:0, total:amount,
    payment:'Store Credit', tendered:0, change:0
  });
  save('invoices',invoices);
  return c.storeCredit;
}

function redeemStoreCredit(customerId, amount){
  const c=customers.find(x=>x.id===customerId);
  if(!c||(c.storeCredit||0)<amount) return false;
  c.storeCredit=(c.storeCredit||0)-amount;
  save('customers',customers);
  addAudit('STORE_CREDIT',`Redeemed ${fmt(amount)} store credit for ${c.name}`);
  return true;
}

function redeemLoyaltyAsCredit(customerId, points){
  const c=customers.find(x=>x.id===customerId);
  if(!c||c.points<points) return false;
  const dollarValue=points/settings.pointsRedeemRate;
  c.points-=points;
  c.storeCredit=(c.storeCredit||0)+dollarValue;
  save('customers',customers);
  addAudit('LOYALTY',`Redeemed ${points} points for ${fmt(dollarValue)} store credit — ${c.name}`);
  return dollarValue;
}

// ══════════════════════════════════════════════════════════
// EMAIL RECEIPT — EmailJS
// ══════════════════════════════════════════════════════════
async function sendEmailReceipt(inv, toEmail){
  if(!settings.emailjsPublicKey||!settings.emailjsServiceId||!settings.emailjsTemplateId){
    showAlert('global-alert','Email not configured — go to Settings → Email to set up EmailJS','amber');
    return false;
  }
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js');
    window.emailjs.init(settings.emailjsPublicKey);
    const taxSummary=inv.taxLines?inv.taxLines.map(t=>`${t.label}: ${fmt(t.amount)}`).join(' | '):'';
    const lineItems=inv.lines.map(l=>`${l.name} ×${l.qty} — ${fmt(l.price*l.qty)}`).join('\n');
    await window.emailjs.send(settings.emailjsServiceId, settings.emailjsTemplateId, {
      to_email: toEmail,
      to_name: inv.customerName||'Valued Customer',
      shop_name: settings.shopName,
      shop_address: settings.shopAddress,
      shop_phone: settings.shopPhone,
      invoice_number: inv.number,
      invoice_date: fmtDate(inv.date),
      line_items: lineItems,
      subtotal: fmt(inv.subtotal),
      discount: inv.discount?fmt(inv.discount):'$0.00',
      tax_summary: taxSummary,
      total: fmt(inv.total),
      payment_method: inv.payment,
      gst_number: settings.shopGST||'',
    });
    addAudit('EMAIL',`Receipt emailed to ${toEmail} for invoice ${inv.number}`);
    showAlert('global-alert',`✅ Receipt sent to ${toEmail}`,'green');
    return true;
  } catch(e){
    showAlert('global-alert','Email failed: '+e.message,'red');
    return false;
  }
}

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="card-title">Sales — Last 7 Days</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:100px">
        ${last7.map(d=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="width:100%;background:var(--accent);border-radius:4px 4px 0 0;height:${Math.max(4,Math.round((d.total/maxSale)*80))}px;opacity:${d.total?1:.2}"></div>

        `).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Repairs by Status</div>
      ${Object.entries(STATUS_LABELS).map(([k,v])=>{
        const cnt=repairs.filter(r=>r.status===k).length;
        if(!cnt) return '';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <span class="badge ${STATUS_BADGE[k]}">${v}</span>
          <span class="font-bold">${cnt}</span>
        </div>`;
      }).join('')||'<p class="text-muted" style="font-size:13px">No repairs yet</p>'}

  ${readyPickup?`
  <div class="alert alert-green mt-3">
    ✅ <strong>${readyPickup} device${readyPickup!==1?'s':''}</strong> ready for customer pickup — 
    <a href="#" onclick="showPage('repairs');return false" style="color:var(--green)">View tickets</a>
  </div>`:''}

  ${lowStock.length?`
  <div class="alert alert-amber mt-3">
    ⚠️ <strong>${lowStock.length} item${lowStock.length!==1?'s':''}</strong> below reorder threshold: 
    ${lowStock.slice(0,3).map(p=>`<strong>${p.name}</strong> (${p.stock} left)`).join(', ')}${lowStock.length>3?'…':''}
  </div>`:''}

  <div class="card mt-3">
    <div class="card-title">Recent Invoices</div>
    ${invoices.length===0?'<p class="text-muted" style="font-size:13px">No sales yet — go to Point of Sale to create your first invoice.</p>':
    `<table><thead><tr><th>#</th><th>Customer</th><th>Items</th><th>Payment</th><th class="text-right">Total</th><th>Date</th></tr></thead><tbody>
    ${invoices.slice(-8).reverse().map(inv=>`
    <tr>
      <td class="font-mono text-accent">${inv.number}</td>
      <td>${escH(inv.customerName||'Walk-in')}</td>
      <td>${inv.lines.length} item${inv.lines.length!==1?'s':''}</td>
      <td>${escH(inv.payment)}</td>
      <td class="text-right font-bold">${fmt(inv.total)}</td>
      <td class="text-muted">${fmtDate(inv.date)}</td>
    </tr>`).join('')}
    </tbody></table>`}
  </div>`;
}

let cart=[];
let posCustomer=null;

function renderPOS(c){
  c.style.height='calc(100vh - 57px)';
  c.style.overflow='hidden';
  c.style.padding='16px 20px';

      <div class="scan-bar">
        <div class="scan-dot"></div>
        <input id="sku-input" placeholder="Scan barcode or type SKU — press Enter" autofocus

        <button class="btn btn-primary" onclick="scanSku()">Add</button>
        <button class="btn btn-secondary" onclick="openProductPicker()">Browse</button>

      <!-- Cart -->

            <p style="font-size:13px">Cart is empty</p>

    </div>
    <div class="pos-right">
      <!-- Customer -->
      <div class="card" style="padding:14px">
        <div class="card-title" style="margin-bottom:10px">Customer</div>
        <div id="customer-panel">
          <div style="display:flex;gap:8px">
            <input id="cust-search" placeholder="Phone number…" style="flex:1;font-family:var(--mono)"

            <button class="btn btn-secondary btn-sm" onclick="lookupCustomer()">Find</button>

          <div id="cust-result" style="margin-top:10px"></div>
        </div>
      </div>
      <!-- Totals -->

        <div class="total-row" style="align-items:center">
          <span>Discount ($)</span>
          <input id="pos-disc" type="number" min="0" placeholder="0"
            style="width:80px;text-align:right;padding:3px 8px;font-size:13px"
            oninput="calcTotals()"/>
        </div>
        <div id="pos-tax-lines"></div>
        <div class="total-row grand"><span>TOTAL (CAD)</span><span id="pos-total">${fmt(0)}</span></div>
        <!-- Loyalty & Store Credit redemption -->
        <div id="loyalty-panel" style="margin-top:8px;display:none">
          <div style="background:var(--surface2);border-radius:8px;padding:10px;font-size:12px">
            <p style="color:var(--text2);margin-bottom:6px;font-weight:600">🏆 Loyalty & Store Credit</p>
            <div id="loyalty-info"></div>
            <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
              <button class="btn btn-secondary btn-sm" onclick="redeemPointsAtPOS()" id="redeem-pts-btn">Redeem Points</button>
              <button class="btn btn-secondary btn-sm" onclick="redeemStoreCreditAtPOS()" id="redeem-sc-btn">Use Store Credit</button>
            </div>
            <div id="redemption-applied" style="margin-top:6px"></div>
          </div>
        </div>
      </div>
      <!-- Payment -->
      <div class="card" style="padding:14px">
        <div class="form-group" style="margin-bottom:8px">

            <option value="Debit">💳 Debit</option>
            <option value="Credit Card">💳 Credit Card</option>

        </div>
        <div class="form-group" style="margin-bottom:8px">
          <label>Amount Tendered ($)</label>
          <input id="pay-tendered" type="number" placeholder="0.00" oninput="calcChange()"/>
        </div>
        <!-- Split payment -->
        <div style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:10px">
          <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);display:block;margin-bottom:6px">Split Payment (optional)</label>

function scanSku(){
  const input=document.getElementById('sku-input');
  const sku=(input.value||'').trim().toUpperCase();
  if(!sku) return;
  const p=products.find(x=>x.sku.toUpperCase()===sku||x.name.toUpperCase().includes(sku));
  if(!p){ showAlert('sku-alert',`No product found for "${sku}"`,'red'); input.value=''; return; }
  addToCart(p);
  input.value='';
  input.focus();
}

function addToCart(p){
  if(p.stock<=0){ alert(`"${p.name}" is out of stock!`); return; }
  const ex=cart.find(c=>c.productId===p.id);
  if(ex){
    if(ex.qty>=p.stock){ alert(`Only ${p.stock} units in stock`); return; }
    ex.qty++;
  } else {
    cart.push({productId:p.id,sku:p.sku,name:p.name,price:p.price,qty:1,disc:0});
  }
  renderCart(); calcTotals();
}

function renderCart(){
  const body=document.getElementById('cart-body');
  const countEl=document.getElementById('cart-count');
  if(!body) return;
  if(cart.length===0){
    body.innerHTML=`<div class="cart-empty">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      <p style="font-size:13px">Cart is empty</p></div>`;
    if(countEl) countEl.textContent='0 items';
    return;
  }
  if(countEl) countEl.textContent=`${cart.reduce((s,c)=>s+c.qty,0)} items`;
  body.innerHTML=cart.map((item,i)=>`
  <div class="cart-item">
    <div class="cart-item-desc">
      <p>${escH(item.name)}</p>
      <span class="font-mono">${escH(item.sku)}</span>
    </div>
    <div class="qty-ctrl">
      <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
      <span class="qty-num">${item.qty}</span>
      <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
    </div>
    <div style="min-width:80px;text-align:right">
      <div style="font-weight:700">${fmt(item.price*item.qty)}</div>
      <div style="font-size:11px;color:var(--text3)">${fmt(item.price)} each</div>
    </div>
    <button onclick="removeFromCart(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px" onmouseenter="this.style.color='var(--red)'" onmouseleave="this.style.color='var(--text3)'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>`).join('');
}

function changeQty(i,delta){
  const item=cart[i];
  const p=products.find(x=>x.id===item.productId);
  item.qty+=delta;
  if(item.qty<=0){ cart.splice(i,1); }
  else if(p && item.qty>p.stock){ item.qty=p.stock; alert(`Only ${p.stock} in stock`); }
  renderCart(); calcTotals();
}

function removeFromCart(i){ cart.splice(i,1); renderCart(); calcTotals(); }
function clearCart(){ if(cart.length&&!confirm('Clear cart?')) return; cart=[]; posCustomer=null; window._posLoyaltyDiscount=0; window._posStoreCreditUsed=0; renderCart(); calcTotals(); hideLoyaltyPanel(); }

function holdCart(){
  if(cart.length===0){ alert('Cart is empty — nothing to hold'); return; }
  const name=prompt('Give this held cart a name (e.g. customer name):')||('Hold '+new Date().toLocaleTimeString());
  heldCarts.push({ id:uid(), name, cart:[...cart], customer:posCustomer?{...posCustomer}:null, discount:document.getElementById('pos-disc')?.value||'0', timestamp:new Date().toISOString() });
  save('heldCarts',heldCarts);
  cart=[]; posCustomer=null; window._posLoyaltyDiscount=0; window._posStoreCreditUsed=0;
  renderCart(); calcTotals(); hideLoyaltyPanel();
  showAlert('global-alert',`Cart held as "${name}"`, 'green');
  addAudit('HOLD_CART',`Cart held: ${name}`);
}

function recallHeldCart(){
  if(heldCarts.length===0){ alert('No held carts'); return; }
  const html=`
    <div style="max-height:320px;overflow-y:auto">
      ${heldCarts.map((h,i)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <p style="font-weight:600">${escH(h.name)}</p>
          <p style="font-size:12px;color:var(--text2)">${h.cart.length} items · ${new Date(h.timestamp).toLocaleTimeString()}</p>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="loadHeldCart(${i});closeModal()">Load</button>
          <button class="btn btn-danger btn-sm" onclick="deleteHeldCart(${i})">✕</button>
        </div>
      </div>`).join('')}
    </div>`;
  openModal('Held Carts', html, '<button class="btn btn-secondary" onclick="closeModal()">Close</button>');
}

function loadHeldCart(idx){
  const h=heldCarts[idx];
  if(!h) return;
  cart=[...h.cart]; posCustomer=h.customer||null;
  if(document.getElementById('pos-disc')) document.getElementById('pos-disc').value=h.discount||'0';
  heldCarts.splice(idx,1); save('heldCarts',heldCarts);
  renderCart(); calcTotals();
  if(posCustomer) showLoyaltyPanel(posCustomer);
  addAudit('RECALL_CART',`Cart recalled: ${h.name}`);
}

function deleteHeldCart(idx){
  heldCarts.splice(idx,1); save('heldCarts',heldCarts);
  recallHeldCart();
}

function calcTotals(){
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=(parseFloat(document.getElementById('pos-disc')?.value||0)||0)
    +(window._posLoyaltyDiscount||0)
    +(window._posStoreCreditUsed||0);
  const taxable=Math.max(0,sub-disc);
  const taxResult=calcCanadianTax(taxable, settings.province||'ON');
  const total=taxResult.total;

  if(document.getElementById('pos-sub')) document.getElementById('pos-sub').textContent=fmt(sub);

  const taxLinesEl=document.getElementById('pos-tax-lines');
  if(taxLinesEl){
    let html='';
    if(disc>0) html+=`<div class="total-row" style="color:var(--green)"><span>Discount / Redemption</span><span>−${fmt(disc)}</span></div>`;
    html+=taxResult.lines.map(l=>`<div class="total-row"><span>${l.label}</span><span>${fmt(l.amount)}</span></div>`).join('');
    taxLinesEl.innerHTML=html;
  }

  if(document.getElementById('pos-total')) document.getElementById('pos-total').textContent=fmt(total);
  window._posTaxResult=taxResult;
  window._posDisc=disc;
  window._posSub=sub;
  calcChange();
}

function calcChange(){
  const totalEl=document.getElementById('pos-total');
  if(!totalEl) return;
  const total=parseFloat(totalEl.textContent.replace(settings.currency,''))||0;
  const tendered=parseFloat(document.getElementById('pay-tendered')?.value||0)||0;
  const changeDiv=document.getElementById('change-display');
  const changeAmt=document.getElementById('change-amt');
  if(tendered>=total && total>0 && changeDiv){
    changeDiv.style.display='block';
    changeAmt.textContent=fmt(tendered-total);
  } else if(changeDiv) changeDiv.style.display='none';
}

function lookupCustomer(){
  const ph=(document.getElementById('cust-search')?.value||'').trim();
  const found=customers.find(c=>c.phone===ph||c.name.toLowerCase().includes(ph.toLowerCase()));
  const panel=document.getElementById('cust-result');
  if(!panel) return;
  if(found){
    posCustomer=found;
    const creditBadge=(found.storeCredit||0)>0?`<span style="background:rgba(79,142,247,.15);color:var(--accent);border-radius:999px;padding:1px 8px;font-size:11px;font-weight:700">SC:${fmt(found.storeCredit||0)}</span>`:'';
    panel.innerHTML=`<div class="alert alert-green" style="margin:0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <strong>${escH(found.name)}</strong> ${creditBadge}<br>
          <span style="font-size:11px">${escH(found.phone)}</span>
          ${found.email?`<span style="font-size:11px"> · ${escH(found.email)}</span>`:''}
        </div>
        <button onclick="posCustomer=null;document.getElementById('cust-result').innerHTML='';document.getElementById('cust-search').value='';hideLoyaltyPanel()" style="background:none;border:none;color:var(--green);cursor:pointer;font-size:16px">✕</button>
      </div>
      <div style="margin-top:6px;font-size:11px;display:flex;gap:10px">
        <span>🏆 ${found.points} pts</span>
        <span>💰 ${fmt(found.spent)} spent</span>
        ${(found.storeCredit||0)>0?`<span>🏷️ ${fmt(found.storeCredit)} credit</span>`:''}
      </div>
    </div>`;
    // Show loyalty/credit panel
    showLoyaltyPanel(found);
  } else {
    posCustomer=null;
    panel.innerHTML=`<div class="alert alert-amber" style="margin:0">No customer found. Sale will be recorded as walk-in.</div>`;
    hideLoyaltyPanel();
  }
}

function showLoyaltyPanel(c){
  const p=document.getElementById('loyalty-panel');
  const info=document.getElementById('loyalty-info');
  if(!p||!info) return;
  p.style.display='block';
  info.innerHTML=`
    <div style="display:flex;gap:12px;font-size:12px">
      <span>🏆 <strong>${c.points}</strong> pts (≈${fmt(c.points/settings.pointsRedeemRate)} value)</span>
      <span>🏷️ <strong>${fmt(c.storeCredit||0)}</strong> credit</span>
    </div>`;
  // Update button states
  const ptsBtn=document.getElementById('redeem-pts-btn');
  const scBtn=document.getElementById('redeem-sc-btn');
  if(ptsBtn) ptsBtn.disabled=c.points<settings.pointsRedeemRate;
  if(scBtn) scBtn.disabled=!(c.storeCredit>0);
}

function hideLoyaltyPanel(){
  const p=document.getElementById('loyalty-panel');
  if(p) p.style.display='none';
  window._posLoyaltyDiscount=0;
  window._posStoreCreditUsed=0;
  calcTotals();
}

function redeemPointsAtPOS(){
  if(!posCustomer) return;
  const maxPoints=Math.floor(posCustomer.points/settings.pointsRedeemRate)*settings.pointsRedeemRate;
  const maxDollar=maxPoints/settings.pointsRedeemRate;
  const use=prompt(`You have ${posCustomer.points} points (≈${fmt(posCustomer.points/settings.pointsRedeemRate)}).
How many points to redeem? (min ${settings.pointsRedeemRate}, max ${maxPoints})`);
  if(!use) return;
  const pts=Math.floor(parseInt(use)/settings.pointsRedeemRate)*settings.pointsRedeemRate;
  if(pts<=0||pts>posCustomer.points){ alert('Invalid points amount'); return; }
  window._posLoyaltyDiscount=(window._posLoyaltyDiscount||0)+(pts/settings.pointsRedeemRate);
  document.getElementById('redemption-applied').innerHTML=
    `<span style="color:var(--green);font-size:11px">✓ ${pts} pts = ${fmt(pts/settings.pointsRedeemRate)} discount applied</span>`;
  calcTotals();
}

function redeemStoreCreditAtPOS(){
  if(!posCustomer||(posCustomer.storeCredit||0)<=0) return;
  const use=prompt(`Store credit available: ${fmt(posCustomer.storeCredit)}
How much to apply?`);
  if(!use) return;
  const amt=parseFloat(use);
  if(isNaN(amt)||amt<=0||amt>posCustomer.storeCredit){ alert('Invalid amount'); return; }
  window._posStoreCreditUsed=(window._posStoreCreditUsed||0)+amt;
  document.getElementById('redemption-applied').innerHTML=
    `<span style="color:var(--accent);font-size:11px">✓ ${fmt(amt)} store credit applied</span>`;
  calcTotals();
}

function completeSale(){
  if(cart.length===0){ alert('Cart is empty'); return; }

  // Use pre-computed tax result from calcTotals (or recompute if needed)
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=parseFloat(document.getElementById('pos-disc')?.value||0)||0;
  const taxable=Math.max(0,sub-disc);
  const taxResult=calcCanadianTax(taxable, settings.province||'ON');
  const total=taxResult.total;
  const tendered=parseFloat(document.getElementById('pay-tendered')?.value||0)||0;
  if(tendered>0 && tendered<total){ alert('Tendered amount is less than the total'); return; }

  const payment=document.getElementById('pay-method')?.value||'Cash';
  const invNumber = generateInvoiceNumber();

  // Deduct stock
  cart.forEach(item=>{
    const p=products.find(x=>x.id===item.productId);
    if(p){ p.stock=Math.max(0,p.stock-item.qty); }
  });
  save('products',products);

  // Handle store credit redemption
  if(posCustomer && (window._posStoreCreditUsed||0)>0){
    redeemStoreCredit(posCustomer.id, window._posStoreCreditUsed);
  }
  // Handle loyalty point redemption
  const loyaltyPtsUsed=Math.round((window._posLoyaltyDiscount||0)*settings.pointsRedeemRate);
  if(posCustomer && loyaltyPtsUsed>0){
    posCustomer.points=Math.max(0,posCustomer.points-loyaltyPtsUsed);
  }
  // Update customer — earn new points on final total
  if(posCustomer){
    const ptsEarned=Math.floor(total*settings.pointsPerDollar);
    posCustomer.points+=ptsEarned;
    posCustomer.spent+=total;
    posCustomer.lastVisit=today();
    save('customers',customers);
  }

  // Split payment
  const splitMethod=document.getElementById('split-method')?.value||'';
  const splitAmount=parseFloat(document.getElementById('split-amount')?.value||0)||0;
  const paymentSplit=splitMethod&&splitAmount>0?[
    {method:payment, amount:tendered-splitAmount},
    {method:splitMethod, amount:splitAmount}
  ]:null;

  const invoice={
    id:uid(), number:invNumber, date:today(),
    customerId:posCustomer?.id||null, customerName:posCustomer?.name||'Walk-in',
    customerPhone:posCustomer?.phone||'', customerEmail:posCustomer?.email||'',
    province: settings.province||'ON',
    lines:[...cart], subtotal:sub, discount:disc,
    taxLines:taxResult.lines,
    gst:taxResult.gst, pst:taxResult.pst, hst:taxResult.hst,
    totalTax:taxResult.totalTax,
    total, payment:paymentSplit?`${payment}+${splitMethod}`:payment,
    paymentSplit, tendered, change:Math.max(0,tendered-total),
    loyaltyPtsUsed, storeCreditUsed:window._posStoreCreditUsed||0,
    createdAt:new Date().toISOString()
  };
  invoices.push(invoice);
  save('invoices',invoices);
  addAudit('INVOICE_CREATE',`Invoice ${invNumber} — ${fmt(total)} — ${invoice.payment}`);

  // Keep a reference to the last completed invoice so the user can
  // manually reprint it if the browser blocked the automatic print dialog
  // (common in some embedded/in-app browsers and strict popup blockers).
  window._lastInvoice = invoice;

  // Print invoice
  printInvoice(invoice);

  // Post-sale: offer email receipt
  const custEmail=posCustomer?.email||'';
  if(custEmail){
    setTimeout(()=>{
      if(confirm(`Send email receipt to ${custEmail}?`)){
        sendEmailReceipt(invoice, custEmail);
      }
    },600);
  } else if(posCustomer) {
    setTimeout(()=>{
      const e=prompt('Enter email address to send receipt (or cancel to skip):');
      if(e&&e.includes('@')) sendEmailReceipt(invoice, e);
    },600);
  }

  cart=[]; posCustomer=null;
  window._posTaxResult=null; window._posLoyaltyDiscount=0; window._posStoreCreditUsed=0;
  renderPOS(document.getElementById('page-content'));
  showSaleCompleteBanner(invNumber, total);
}

/**
 * Shows a persistent success banner with a manual "Print Invoice" button.
 * This exists because window.print() can be silently blocked by some
 * embedded browsers, kiosk apps, or strict popup blockers — if that
 * happens the auto-print in printInvoice() does nothing visible, so this
 * gives the cashier an obvious manual way to trigger it themselves.
 */
function showSaleCompleteBanner(invNumber, total){
  let el=document.getElementById('sale-complete-banner');
  if(el) el.remove();
  el=document.createElement('div');
  el.id='sale-complete-banner';
  el.style.cssText='position:fixed;top:16px;right:16px;z-index:999;min-width:300px;background:var(--green-bg);border:1px solid rgba(34,197,94,.4);border-radius:10px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,.4)';
  el.innerHTML=`
    <div style="color:var(--green);font-weight:700;font-size:13px;margin-bottom:8px">✅ Sale complete! Invoice ${escH(invNumber)} — ${fmt(total)}</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="reprintLastInvoice()">🖨️ Print Invoice</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('sale-complete-banner').remove()">Dismiss</button>
    </div>`;
  document.body.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },15000);
}

function reprintLastInvoice(){
  if(!window._lastInvoice){ alert('No recent invoice to print.'); return; }
  printInvoice(window._lastInvoice);
}

    #print-area .inv-totals-inner { width:300px }
    #print-area .tot-row { display:flex; justify-content:space-between; padding:6px 0; font-size:13px; color:#555; border-bottom:1px solid #f0f0f0 }
    #print-area .tot-row.grand { font-size:17px; font-weight:800; color:#1a1a2e; border-top:2px solid #1a1a2e; border-bottom:none; padding-top:12px; margin-top:4px }

      </thead>
      <tbody>

        <tr>

        ${(inv.discount||0)>0?`<div class="tot-row"><span>Discount</span><span class="discount">−${fmt(inv.discount)}</span></div>`:''}

  area.style.display='block';

  // Reliable print trigger: wait one animation frame so the browser has

  // (onafterprint) rather than guessing with a fixed timeout — the old
  // fixed 250ms timeout could hide the invoice before slower browsers
  // finished rendering it, producing a blank or cut-off printout.
  function cleanupAfterPrint(){

      setTimeout(cleanupAfterPrint, 5000);
    });
  });

function lookupRepairCustomer(){
  const ph=document.getElementById('nr-phone')?.value?.trim();
  const found=customers.find(c=>c.phone===ph);
  const info=document.getElementById('nr-cust-info');
  if(found && info){
    document.getElementById('nr-name').value=found.name;
    info.innerHTML=`<div class="alert alert-green" style="font-size:12px;margin-bottom:10px">✓ Existing customer: <strong>${escH(found.name)}</strong> · ${found.points} loyalty points</div>`;
  } else if(info) info.innerHTML='';

function saveNewRepair(){
  const phone=document.getElementById('nr-phone')?.value?.trim();
  const name=document.getElementById('nr-name')?.value?.trim();
  const device=document.getElementById('nr-device')?.value?.trim();
  if(!phone||!name||!device){ alert('Customer phone, name, and device are required'); return; }

  // Create customer if new
  let cust=customers.find(c=>c.phone===phone);
  if(!cust){
    cust={id:uid(),name,phone,email:'',address:'',points:0,spent:0,lastVisit:today()};
    customers.push(cust);
    save('customers',customers);
  }

  const nextNo=(repairs.length>0?Math.max(...repairs.map(r=>r.ticketNo))+1:1001);
  const r={
    id:uid(), ticketNo:nextNo, status:'RECEIVED',
    customerId:cust.id, customerName:cust.name, phone:cust.phone,
    device, issue:document.getElementById('nr-issue')?.value,
    description:document.getElementById('nr-desc')?.value||'',
    estimatedCost:parseFloat(document.getElementById('nr-cost')?.value)||null,
    finalCost:null, approvedCost:null,
    warrantyDays:parseInt(document.getElementById('nr-warranty')?.value)||90,
    statusHistory:[{status:'RECEIVED',note:'Ticket created',date:new Date().toISOString()}],
    parts:[], createdAt:today(), updatedAt:today()
  };
  repairs.push(r);
  save('repairs',repairs);
  closeModal();
  updateBadges();
  renderRepairs(document.getElementById('page-content'));
}

  </div>
  <!-- Status advance -->
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">

    <p style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Parts Used</p>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="rd-part-sku" placeholder="Scan part SKU…" style="flex:1;font-family:var(--mono)" onkeydown="if(event.key==='Enter')addRepairPart('${r.id}')"/>
      <input id="rd-part-qty" type="number" value="1" style="width:60px;text-align:center"/>
      <button class="btn btn-secondary btn-sm" onclick="addRepairPart('${r.id}')">Use Part</button>
    </div>
    ${r.parts.length?`<div style="font-size:12px;color:var(--text2)">${r.parts.map(p=>`<span style="margin-right:10px">• ${escH(p.name)} ×${p.qty}</span>`).join('')}</div>`:'<p style="font-size:12px;color:var(--text3)">No parts recorded yet</p>'}
  </div>
  <!-- History -->
  <div>
    <p style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">History</p>
    ${r.statusHistory.slice().reverse().map(h=>`
    <div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span class="badge ${STATUS_BADGE[h.status]}" style="flex-shrink:0">${STATUS_LABELS[h.status]}</span>
      <span style="font-size:12px;color:var(--text2);flex:1">${h.note?escH(h.note):''}</span>
      <span style="font-size:11px;color:var(--text3);white-space:nowrap">${fmtDate(h.date)}</span>
    </div>`).join('')}
  </div>
  ${(r.status==='COMPLETED'||r.status==='IN_PROGRESS'||r.status==='READY')?`
  <div style="margin-top:14px">
    <button class="btn btn-green w-full" onclick="generateRepairInvoice('${r.id}')">🧾 Generate Invoice for this Repair</button>
  </div>`:''}`;

  openModal(`Repair Ticket #${r.ticketNo}`,html,'<button class="btn btn-secondary" onclick="closeModal()">Close</button>',true);
}

function advanceRepair(id,nextStatus){
  const r=repairs.find(x=>x.id===id);
  if(!r) return;
  if(nextStatus==='COMPLETED' && !r.approvedCost && !r.finalCost){
    if(!confirm('No approved cost set. Mark as completed anyway?')) return;
  }
  const note=document.getElementById('rd-note')?.value||'';
  r.status=nextStatus;
  r.updatedAt=today();
  r.statusHistory.push({status:nextStatus,note,date:new Date().toISOString()});
  if(nextStatus==='READY') alert(`📱 SMS would be sent to ${r.phone}: "Your ${r.device} repair is ready for pickup at ${settings.shopName}!"`);
  save('repairs',repairs);
  closeModal();
  updateBadges();
  renderRepairs(document.getElementById('page-content'));
}

function saveRepairCosts(id){
  const r=repairs.find(x=>x.id===id);
  if(!r) return;
  r.estimatedCost=parseFloat(document.getElementById('rd-est')?.value)||null;
  r.approvedCost=parseFloat(document.getElementById('rd-approved')?.value)||null;
  r.finalCost=parseFloat(document.getElementById('rd-final')?.value)||null;
  save('repairs',repairs);
  alert('Costs saved!');
}

function addRepairPart(id){
  const r=repairs.find(x=>x.id===id);
  const sku=(document.getElementById('rd-part-sku')?.value||'').trim().toUpperCase();
  const qty=parseInt(document.getElementById('rd-part-qty')?.value||'1')||1;
  if(!sku){ alert('Enter a part SKU'); return; }
  const p=products.find(x=>x.sku.toUpperCase()===sku);
  if(!p){ alert(`No product with SKU "${sku}"`); return; }
  if(p.stock<qty){ alert(`Only ${p.stock} in stock`); return; }
  p.stock-=qty;
  save('products',products);
  r.parts=r.parts||[];
  const ex=r.parts.find(x=>x.sku===p.sku);
  if(ex) ex.qty+=qty;
  else r.parts.push({sku:p.sku,name:p.name,qty,cost:p.cost});
  save('repairs',repairs);
  openRepairDetail(id);// re-render
}

function generateRepairInvoice(id){
  const r=repairs.find(x=>x.id===id);
  if(!r) return;
  const cost=r.finalCost||r.approvedCost||r.estimatedCost||0;
  cart=[{productId:'__repair__',sku:'REPAIR',name:`Repair: ${r.device} — ${r.issue} (#${r.ticketNo})`,price:cost,qty:1,disc:0}];
  posCustomer=customers.find(c=>c.id===r.customerId)||null;
  closeModal();
  showPage('pos');
}

function saveStockAdj(id){

  save('products',products);
  closeModal(); updateBadges();
  renderInventory(document.getElementById('page-content'));
}

function confirmIssueCredit(customerId){
