function renderReports(c){
  const now=new Date();
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  const todayStr=today();

  const thisMonth=invoices.filter(i=>i.date>=monthStart);
  const monthRevenue=thisMonth.reduce((s,i)=>s+i.total,0);
  const monthTax=thisMonth.reduce((s,i)=>s+(i.totalTax||i.tax||0),0);
  const monthProfit=invoices.reduce((s,inv)=>{
    return s+inv.lines.reduce((ls,l)=>{
      const p=products.find(x=>x.id===l.productId);
      if(!p) return ls+(l.price*l.qty);// repair line — count as pure revenue
      return ls+(l.price-p.cost)*l.qty;
    },0);
  },0);

  // By category
  const byCat={};
  invoices.forEach(inv=>inv.lines.forEach(l=>{
    const p=products.find(x=>x.id===l.productId);
    const cat=p?p.category:'REPAIR';
    byCat[cat]=(byCat[cat]||0)+l.price*l.qty;
  }));

  // By payment
  const byPay={};
  invoices.forEach(i=>{ byPay[i.payment]=(byPay[i.payment]||0)+i.total; });

  // Top products
  const prodSales={};
  invoices.forEach(inv=>inv.lines.forEach(l=>{
    if(!l.productId||l.productId==='__repair__') return;
    prodSales[l.productId]=(prodSales[l.productId]||{name:l.name,qty:0,rev:0});
    prodSales[l.productId].qty+=l.qty;
    prodSales[l.productId].rev+=l.price*l.qty;
  }));
  const topProds=Object.entries(prodSales).sort((a,b)=>b[1].qty-a[1].qty).slice(0,8);

  c.innerHTML=`
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">This Month Revenue</div><div class="stat-value text-green">${fmt(monthRevenue)}</div><div class="stat-sub">${thisMonth.length} invoices</div></div>
    <div class="stat-card"><div class="stat-label">Tax Collected (This Month)</div><div class="stat-value text-amber">${fmt(monthTax)}</div><div class="stat-sub">${CA_PROVINCES[settings.province]?.label||'Canada'}</div></div>
    <div class="stat-card"><div class="stat-label">All-time Gross Profit</div><div class="stat-value text-accent">${fmt(monthProfit)}</div><div class="stat-sub">revenue minus product cost</div></div>
    <div class="stat-card"><div class="stat-label">Total Invoices</div><div class="stat-value">${invoices.length}</div><div class="stat-sub">all time</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="card-title">Revenue by Category</div>
      ${Object.entries(byCat).length===0?'<p class="text-muted" style="font-size:13px">No sales yet</p>':
      Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,rev])=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
        <span class="badge ${CAT_BADGE[cat]||'badge-gray'}">${cat}</span>
        <span class="font-bold">${fmt(rev)}</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Revenue by Payment Method</div>
      ${Object.entries(byPay).length===0?'<p class="text-muted" style="font-size:13px">No sales yet</p>':
      Object.entries(byPay).sort((a,b)=>b[1]-a[1]).map(([pay,rev])=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;font-weight:600">${pay}</span>
        <span class="font-bold">${fmt(rev)}</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Top Selling Products</div>
      ${topProds.length===0?'<p class="text-muted" style="font-size:13px">No product sales yet</p>':
      topProds.map(([id,d],i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="width:20px;height:20px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${i+1}</span>
        <div style="flex:1;min-width:0"><p style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(d.name)}</p></div>
        <div style="text-align:right;flex-shrink:0"><p class="font-bold">${d.qty} units</p><p style="font-size:11px;color:var(--text3)">${fmt(d.rev)}</p></div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Low / Out of Stock</div>
      ${products.filter(p=>p.stock<=p.threshold).length===0?'<p class="text-green" style="font-size:13px">✓ All products adequately stocked</p>':
      products.filter(p=>p.stock<=p.threshold).map(p=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
        <div><p style="font-size:13px;font-weight:600">${escH(p.name)}</p><p style="font-size:11px;color:var(--text3)">${escH(p.sku)}</p></div>
        <span class="font-bold text-red">${p.stock} left</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Profit by Brand</div>
      ${(()=>{
        const byBrand={};
        invoices.forEach(inv=>inv.lines.forEach(l=>{
          const p=products.find(x=>x.id===l.productId);
          if(!p) return;
          const brand=p.subcategory||'Generic';
          byBrand[brand]=byBrand[brand]||{revenue:0,profit:0};
          byBrand[brand].revenue+=l.price*l.qty;
          byBrand[brand].profit+=(l.price-p.cost)*l.qty;
        }));
        const entries=Object.entries(byBrand).sort((a,b)=>b[1].profit-a[1].profit);
        if(entries.length===0) return '<p class="text-muted" style="font-size:13px">No sales yet</p>';
        return entries.map(([brand,d])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;font-weight:600">${escH(brand)}</span>
          <div style="text-align:right"><p class="font-bold text-green">${fmt(d.profit)}</p><p style="font-size:11px;color:var(--text3)">${fmt(d.revenue)} revenue</p></div>
        </div>`).join('');
      })()}
    </div>
  </div>

  <div class="card mt-3">
    <div class="card-title">🍁 GST/HST/PST Tax Report (for CRA filing)</div>
    ${(()=>{
      // Group by month
      const byMonth={};
      invoices.filter(i=>i.type!=='REFUND'&&i.type!=='STORE_CREDIT_ISSUED').forEach(inv=>{
        const m=inv.date.slice(0,7); // YYYY-MM
        byMonth[m]=byMonth[m]||{gst:0,pst:0,hst:0,total:0,sales:0};
        byMonth[m].gst+=inv.gst||0;
        byMonth[m].pst+=inv.pst||0;
        byMonth[m].hst+=inv.hst||0;
        byMonth[m].total+=inv.totalTax||0;
        byMonth[m].sales+=inv.subtotal||0;
      });
      const months=Object.keys(byMonth).sort().reverse().slice(0,12);
      if(months.length===0) return '<p class="text-muted" style="font-size:13px">No tax data yet</p>';
      return `<table><thead><tr><th>Month</th><th class="text-right">Taxable Sales</th><th class="text-right">GST</th><th class="text-right">PST/QST</th><th class="text-right">HST</th><th class="text-right">Total Tax</th></tr></thead><tbody>
      ${months.map(m=>{
        const d=byMonth[m];
        const monthLabel=new Date(m+'-01').toLocaleDateString('en-CA',{year:'numeric',month:'long'});
        return `<tr>
          <td class="font-bold">${monthLabel}</td>
          <td class="text-right">${fmt(d.sales)}</td>
          <td class="text-right">${fmt(d.gst)}</td>
          <td class="text-right">${fmt(d.pst)}</td>
          <td class="text-right">${fmt(d.hst)}</td>
          <td class="text-right font-bold text-amber">${fmt(d.total)}</td>
        </tr>`;
      }).join('')}
      </tbody></table>
      <button class="btn btn-secondary btn-sm mt-3" onclick="exportTaxReportCSV()">⬇️ Export Tax Report (CSV)</button>`;
    })()}
  </div>

  <div class="card mt-3">
    <div class="card-title">Export Reports</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="exportInvoicesCSV()">⬇️ All Invoices (CSV)</button>
      <button class="btn btn-secondary" onclick="exportInventoryCSV()">⬇️ Inventory (CSV)</button>
      <button class="btn btn-secondary" onclick="exportCustomersCSV()">⬇️ Customers (CSV)</button>
    </div>
  </div>

  <div class="card mt-3">
    <div class="card-title">Data Backup & Restore</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Export all your data as a JSON backup file. Keep this safe — it contains all customers, inventory, repairs, and invoices.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="exportData()">⬇️ Export Backup (JSON)</button>
      <label class="btn btn-secondary" style="cursor:pointer">
        ⬆️ Restore from Backup
        <input type="file" accept=".json" style="display:none" onchange="importData(event)"/>
      </label>
    </div>
  </div>`;
}

function downloadCSV(filename, rows){
  const csv=rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
}

function exportTaxReportCSV(){
  const byMonth={};
  invoices.filter(i=>i.type!=='REFUND'&&i.type!=='STORE_CREDIT_ISSUED').forEach(inv=>{
    const m=inv.date.slice(0,7);
    byMonth[m]=byMonth[m]||{gst:0,pst:0,hst:0,total:0,sales:0};
    byMonth[m].gst+=inv.gst||0; byMonth[m].pst+=inv.pst||0; byMonth[m].hst+=inv.hst||0;
    byMonth[m].total+=inv.totalTax||0; byMonth[m].sales+=inv.subtotal||0;
  });
  const rows=[['Month','Taxable Sales','GST','PST/QST','HST','Total Tax Collected']];
  Object.keys(byMonth).sort().forEach(m=>{
    const d=byMonth[m];
    rows.push([m, d.sales.toFixed(2), d.gst.toFixed(2), d.pst.toFixed(2), d.hst.toFixed(2), d.total.toFixed(2)]);
  });
  downloadCSV(`TaxReport_${today()}.csv`, rows);
}

function exportInvoicesCSV(){
  const rows=[['Invoice#','Date','Customer','Phone','Payment','Subtotal','Discount','Tax','Total']];
  invoices.forEach(i=>rows.push([i.number,i.date,i.customerName||'Walk-in',i.customerPhone||'',i.payment,(i.subtotal||0).toFixed(2),(i.discount||0).toFixed(2),(i.totalTax||0).toFixed(2),(i.total||0).toFixed(2)]));
  downloadCSV(`Invoices_${today()}.csv`, rows);
}

function exportInventoryCSV(){
  const rows=[['SKU','Name','Category','Brand','Shelf','Cost','Price','Stock','Threshold']];
  products.forEach(p=>rows.push([p.sku,p.name,p.category,p.subcategory||'',p.shelf||'',p.cost.toFixed(2),p.price.toFixed(2),p.stock,p.threshold]));
  downloadCSV(`Inventory_${today()}.csv`, rows);
}

function exportCustomersCSV(){
  const rows=[['Name','Phone','Email','Total Spent','Points','Store Credit','Last Visit']];
  customers.forEach(c=>rows.push([c.name,c.phone,c.email||'',(c.spent||0).toFixed(2),c.points,(c.storeCredit||0).toFixed(2),c.lastVisit||'']));
  downloadCSV(`Customers_${today()}.csv`, rows);
}

function exportData(){
  const data={
    version:1, exportedAt:new Date().toISOString(),
    settings,products,customers,repairs,invoices
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`MobileShopCRM_backup_${today()}.json`;
  a.click();
}

function importData(e){
  const file=e.target.files[0];
  if(!file) return;
  if(!confirm('⚠️ This will REPLACE all your current data with the backup. Are you sure?')) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.version){ alert('Invalid backup file'); return; }
      if(data.settings) { Object.assign(settings,data.settings); DB.set('settings',settings); }
      if(data.products) { products=data.products; save('products',products); }
      if(data.customers) { customers=data.customers; save('customers',customers); }
      if(data.repairs) { repairs=data.repairs; save('repairs',repairs); }
      if(data.invoices) { invoices=data.invoices; save('invoices',invoices); }
      alert('✅ Backup restored successfully!');
      showPage('dashboard');
    }catch(err){ alert('Failed to parse backup file: '+err.message); }
  };
  reader.readAsText(file);
}

// END-OF-DAY CASH-UP

function renderCashUp(c){
  const todayStr=today();
  const todayInvoices=invoices.filter(i=>i.date===todayStr && i.type!=='STORE_CREDIT_ISSUED');
  const cashSales=todayInvoices.filter(i=>i.payment==='Cash'||i.payment?.startsWith('Cash+')).reduce((s,i)=>{
    if(i.paymentSplit){ const cashPart=i.paymentSplit.find(p=>p.method==='Cash'); return s+(cashPart?cashPart.amount:0); }
    return s+(i.payment==='Cash'?i.total:0);
  },0);
  const cardSales=todayInvoices.filter(i=>['Debit','Credit Card'].includes(i.payment)).reduce((s,i)=>s+i.total,0);
  const etransferSales=todayInvoices.filter(i=>i.payment==='E-Transfer').reduce((s,i)=>s+i.total,0);
  const totalSales=todayInvoices.reduce((s,i)=>s+i.total,0);
  const todaySession=cashSessions.find(s=>s.date===todayStr);

  c.innerHTML=`
  <div style="max-width:640px">
    ${todaySession?`
    <div class="alert alert-green mb-3">✓ Today's cash-up was completed at ${new Date(todaySession.closedAt).toLocaleTimeString()}</div>
    `:''}

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Sales Today</div><div class="stat-value text-green">${fmt(totalSales)}</div><div class="stat-sub">${todayInvoices.length} invoices</div></div>
      <div class="stat-card"><div class="stat-label">Cash Sales</div><div class="stat-value text-accent">${fmt(cashSales)}</div></div>
      <div class="stat-card"><div class="stat-label">Card / Debit</div><div class="stat-value">${fmt(cardSales)}</div></div>
      <div class="stat-card"><div class="stat-label">E-Transfer</div><div class="stat-value">${fmt(etransferSales)}</div></div>
    </div>

    <div class="card mt-3">
      <div class="card-title">Cash Drawer Reconciliation</div>
      <div class="form-row">
        <div class="form-group">
          <label>Opening Float ($)</label>
          <input id="cu-float" type="number" value="${settings.cashFloat||200}"/>
        </div>
        <div class="form-group">
          <label>Expected Cash in Drawer</label>
          <input id="cu-expected" type="number" value="${(parseFloat(settings.cashFloat||200)+cashSales).toFixed(2)}" disabled style="opacity:.6"/>
        </div>
      </div>
      <div class="form-group">
        <label>Actual Cash Counted ($)</label>
        <input id="cu-actual" type="number" placeholder="Count the drawer and enter here" oninput="calcCashDiff()"/>
      </div>
      <div id="cash-diff-display" style="display:none" class="alert mt-2"></div>
      <div class="form-group mt-2">
        <label>Notes (optional)</label>
        <textarea id="cu-notes" placeholder="Any discrepancy notes…" rows="2"></textarea>
      </div>
      <button class="btn btn-primary w-full mt-2" onclick="closeCashSession()">🔒 Close & Record Cash-Up</button>
    </div>

    <div class="card mt-3">
      <div class="card-title">Recent Cash-Up History</div>
      ${cashSessions.length===0?'<p class="text-muted" style="font-size:13px">No cash-ups recorded yet</p>':
      cashSessions.slice().reverse().slice(0,10).map(s=>`
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span>${fmtDate(s.date)}</span>
        <span>Expected: ${fmt(s.expected)} / Actual: ${fmt(s.actual)}</span>
        <span class="${Math.abs(s.difference)<0.01?'text-green':'text-red'}">${s.difference>=0?'+':''}${fmt(s.difference)}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function calcCashDiff(){
  const expected=parseFloat(document.getElementById('cu-expected')?.value||0);
  const actual=parseFloat(document.getElementById('cu-actual')?.value||0);
  const diff=actual-expected;
  const el=document.getElementById('cash-diff-display');
  if(!el) return;
  if(document.getElementById('cu-actual')?.value===''){ el.style.display='none'; return; }
  el.style.display='block';
  el.className='alert mt-2 '+(Math.abs(diff)<0.01?'alert-green':diff>0?'alert-amber':'alert-red');
  el.textContent=Math.abs(diff)<0.01?'✓ Drawer matches exactly':
    diff>0?`Drawer has ${fmt(diff)} MORE than expected (overage)`:
    `Drawer has ${fmt(Math.abs(diff))} LESS than expected (shortage)`;
}

function closeCashSession(){
  const expected=parseFloat(document.getElementById('cu-expected')?.value||0);
  const actual=parseFloat(document.getElementById('cu-actual')?.value);
  if(isNaN(actual)){ alert('Enter the actual cash counted'); return; }
  const float=parseFloat(document.getElementById('cu-float')?.value||0);
  const diff=actual-expected;
  const session={
    id:uid(), date:today(), openFloat:float, expected, actual,
    difference:diff, notes:document.getElementById('cu-notes')?.value||'',
    closedAt:new Date().toISOString(), closedBy:currentStaff().name
  };
  // Remove any existing session for today, replace with new
  cashSessions=cashSessions.filter(s=>s.date!==today());
  cashSessions.push(session);
  save('cashSessions',cashSessions);
  settings.cashFloat=float; DB.set('settings',settings);
  addAudit('CASH_UP',`Cash-up closed: expected ${fmt(expected)}, actual ${fmt(actual)}, diff ${fmt(diff)}`);
  showAlert('global-alert','✅ Cash-up recorded for today','green');
  renderCashUp(document.getElementById('page-content'));
}

function openRefundModal(invId){

    </select>
  </div>
  <div class="form-group">
    <label>Reason for Return</label>
    <select id="refund-reason">
      <option>Customer changed mind</option>
      <option>Defective product</option>
      <option>Wrong item purchased</option>
      <option>Doesn't fit device</option>
      <option>Other</option>
    </select>
  </div>
  <div style="background:var(--surface2);border-radius:8px;padding:12px;margin-top:10px">
    <div style="display:flex;justify-content:space-between;font-weight:700;font-size:15px">
      <span>Refund Total</span><span id="refund-total-display">${fmt(0)}</span>
    </div>
  </div>`;
  openModal(`Refund — ${inv.number}`, html, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="processRefund('${invId}')">Process Refund</button>`, true);
}

function updateRefundTotal(){
  const checked=document.querySelectorAll('.refund-line-cb:checked');
  let total=0;
  checked.forEach(cb=>{ total+=parseFloat(cb.dataset.price)*parseInt(cb.dataset.qty); });
  // Apply tax proportionally
  const taxResult=calcCanadianTax(total, settings.province||'ON');
  document.getElementById('refund-total-display').textContent=fmt(taxResult.total);
}

function processRefund(invId){
  const inv=invoices.find(i=>i.id===invId);
  const checked=document.querySelectorAll('.refund-line-cb:checked');
  if(checked.length===0){ alert('Select at least one item to refund'); return; }
  const method=document.getElementById('refund-method')?.value;
  const reason=document.getElementById('refund-reason')?.value;

  let refundLines=[];
  let restockItems=[];
  checked.forEach(cb=>{
    const idx=parseInt(cb.dataset.idx);
    const line=inv.lines[idx];
    refundLines.push(line);
    if(cb.dataset.restock){ restockItems.push({productId:cb.dataset.restock, qty:line.qty}); }
  });

  const subtotal=refundLines.reduce((s,l)=>s+l.price*l.qty,0);
  const taxResult=calcCanadianTax(subtotal, inv.province||settings.province||'ON');

  // Restock products
  restockItems.forEach(r=>{
    const p=products.find(x=>x.id===r.productId);
    if(p){ p.stock+=r.qty; }
  });
  save('products',products);

  // Create refund record (negative invoice)
  const refundInv={
    id:uid(), number:'RFD-'+uid().slice(3,9).toUpperCase(), date:today(),
    type:'REFUND', originalInvoice:inv.number,
    customerId:inv.customerId, customerName:inv.customerName, customerPhone:inv.customerPhone,
    lines:refundLines, subtotal:-subtotal, discount:0,
    taxLines:taxResult.lines.map(l=>({...l,amount:-l.amount})),
    totalTax:-taxResult.totalTax, total:-taxResult.total,
    payment:method, reason, createdAt:new Date().toISOString()
  };
  invoices.push(refundInv);
  save('invoices',invoices);

  // Handle refund method
  if(method==='Store Credit' && inv.customerId){
    issueStoreCredit(inv.customerId, taxResult.total, `Refund — ${inv.number}`);
  }
  if(inv.customerId){
    const cust=customers.find(c=>c.id===inv.customerId);
    if(cust){ cust.spent=Math.max(0,cust.spent-taxResult.total); save('customers',customers); }
  }

  addAudit('REFUND',`Refunded ${fmt(taxResult.total)} from ${inv.number} — reason: ${reason}`);
  closeModal();
  showAlert('global-alert',`✅ Refund of ${fmt(taxResult.total)} processed`,'green');
  renderRefunds(document.getElementById('page-content'));
}

-- Run this once in your Supabase SQL Editor

CREATE TABLE IF NOT EXISTS crm_settings  (id text PRIMARY KEY, data jsonb, updated_at timestamptz DEFAULT now());
CREATE TABLE IF NOT EXISTS crm_products  (id text PRIMARY KEY, data jsonb, updated_at timestamptz DEFAULT now());
CREATE TABLE IF NOT EXISTS crm_customers (id text PRIMARY KEY, data jsonb, updated_at timestamptz DEFAULT now());
CREATE TABLE IF NOT EXISTS crm_repairs   (id text PRIMARY KEY, data jsonb, updated_at timestamptz DEFAULT now());
CREATE TABLE IF NOT EXISTS crm_invoices  (id text PRIMARY KEY, data jsonb, updated_at timestamptz DEFAULT now());

-- Allow real-time (safe to re-run: skips tables already added)
DO $$
BEGIN

-- Row-level security (make tables accessible with anon key)
ALTER TABLE crm_settings  ENABLE ROW LEVEL SECURITY;
ALTER TABLE crm_products  ENABLE ROW LEVEL SECURITY;
ALTER TABLE crm_customers ENABLE ROW LEVEL SECURITY;
ALTER TABLE crm_repairs   ENABLE ROW LEVEL SECURITY;
ALTER TABLE crm_invoices  ENABLE ROW LEVEL SECURITY;

-- Policies: drop-then-create so this script is safe to run any number
-- of times (CREATE POLICY has no "IF NOT EXISTS" option in Postgres,
-- so re-running without the DROP first would error out and abort the
-- rest of the script, leaving some tables without a policy at all —
-- which is the exact "permission denied" error this fixes).
DROP POLICY IF EXISTS "allow_all" ON crm_settings;
DROP POLICY IF EXISTS "allow_all" ON crm_products;
DROP POLICY IF EXISTS "allow_all" ON crm_customers;
DROP POLICY IF EXISTS "allow_all" ON crm_repairs;
DROP POLICY IF EXISTS "allow_all" ON crm_invoices;

CREATE POLICY "allow_all" ON crm_settings  FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON crm_products  FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON crm_customers FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON crm_repairs   FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_all" ON crm_invoices  FOR ALL USING (true) WITH CHECK (true);</pre>

function manualIssueCredit(){
  const phone=document.getElementById('issue-credit-phone')?.value?.trim();
  const amt=parseFloat(document.getElementById('issue-credit-amt')?.value);
  const c=customers.find(x=>x.phone===phone);
  if(!c){ alert('No customer found with that phone number'); return; }
  if(isNaN(amt)||amt<=0){ alert('Enter a valid amount'); return; }
  issueStoreCredit(c.id, amt, 'Manual issue by staff');
  showAlert('global-alert',`✅ ${fmt(amt)} store credit issued to ${c.name}`,'green');
  document.getElementById('issue-credit-phone').value='';
  document.getElementById('issue-credit-amt').value='';
}

function previewTax(){
  const code=document.getElementById('s-province')?.value||'ON';

  preview.innerHTML=`
    <p style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Tax Preview — on a $100.00 sale</p>
    ${result.lines.map(l=>`
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0">
        <span class="text-muted">${l.label}</span>
        <span class="font-bold">${fmt(l.amount)}</span>

      <span class="font-bold">Total</span>

}

// Logo upload — converts to base64 and stores in settings
function uploadLogo(e){
  const file=e.target.files[0]; if(!file) return;
  if(file.size>500000){ alert('Logo file must be under 500KB. Please resize your image first.'); return; }
  const reader=new FileReader();
  reader.onload=function(ev){
    settings.logoDataUrl=ev.target.result;
    save('settings',settings);
    renderSettings(document.getElementById('page-content'));
    showAlert('global-alert','✓ Logo uploaded successfully','green');
  };
  reader.readAsDataURL(file);
}

function removeLogo(){

  settings.logoDataUrl='';
  save('settings',settings);
  renderSettings(document.getElementById('page-content'));
}

// Push all local data up to cloud — see full implementation below

function clearAllData(){
  if(!confirm('This will DELETE all products, customers, repairs, and invoices. This cannot be undone.\n\nType "yes" to confirm.')) return;
  const answer=prompt('Type "yes" to confirm complete data reset:');
  if(answer!=='yes') return;
  ['settings','products','customers','repairs','invoices'].forEach(k=>localStorage.removeItem('mshop_'+k));
  location.reload();
}

function openModal(title,html,footer,wide=false){
  let el=document.getElementById('modal-overlay');
  if(el) el.remove();
  el=document.createElement('div');
  el.id='modal-overlay';
  el.className='modal-overlay';
  el.onclick=function(e){ if(e.target===el) closeModal(); };
  el.innerHTML=`
  <div class="modal" style="${wide?'max-width:680px':''}">
    <div class="modal-header">
      <h3>${escH(title)}</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">${html}</div>
    ${footer?`<div class="modal-footer">${footer}</div>`:''}
  </div>`;
  document.body.appendChild(el);
  setTimeout(()=>{ const first=el.querySelector('input:not([disabled]),select,textarea'); if(first) first.focus(); },50);
}

function closeModal(){
  const el=document.getElementById('modal-overlay');
  if(el) el.remove();
}

// GLOBAL ALERT
// ══════════════════════════════════════════════════════════
function showAlert(id,msg,type='green'){
  let el=document.getElementById(id);
  if(!el){
    el=document.createElement('div');
    el.id=id;
    el.style.cssText='position:fixed;top:16px;right:16px;z-index:999;min-width:280px;max-width:420px;animation:slideIn .2s ease';
    document.body.appendChild(el);
  }
  el.className=`alert alert-${type}`;
  el.textContent=msg;
  clearTimeout(el._timer);
  el._timer=setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },4000);
}

// GLOBAL CUSTOMER QUICK-SEARCH
// Works from any page — shows customer profile + recent repairs/invoices
// ══════════════════════════════════════════════════════════
function globalCustomerSearch(q){
  const results=document.getElementById('global-search-results');
  if(!results) return;
  q=(q||'').trim().toLowerCase();
  if(q.length<2){ results.innerHTML=''; return; }

  const matches=customers.filter(c=>
    c.name.toLowerCase().includes(q) ||
    c.phone.includes(q) ||
    (c.email||'').toLowerCase().includes(q)
  ).slice(0,6);

  if(matches.length===0){
    results.innerHTML=`<div style="padding:14px;font-size:13px;color:var(--text3);text-align:center">No customers found for "${escH(q)}"</div>`;
    return;
  }

  results.innerHTML=matches.map(c=>{
    const custRepairs=repairs.filter(r=>r.customerId===c.id);
    const openRepair=custRepairs.find(r=>!['COMPLETED','COLLECTED'].includes(r.status));
    const custInvs=invoices.filter(i=>i.customerId===c.id);
    return `
    <div onclick="openCustomerDetail('${c.id}');document.getElementById('global-cust-search').value='';document.getElementById('global-search-results').innerHTML=''"
      style="padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s"
      onmouseenter="this.style.background='var(--surface2)'"
      onmouseleave="this.style.background='transparent'">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">
          ${escH(c.name.charAt(0).toUpperCase())}
        </div>
        <div style="flex:1;min-width:0">
          <p style="font-weight:700;font-size:13px">${escH(c.name)}</p>
          <p style="font-size:11px;color:var(--text3);font-family:var(--mono)">${escH(c.phone)}</p>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <p style="font-size:12px;font-weight:600;color:var(--green)">${fmt(c.spent)}</p>
          <p style="font-size:10px;color:var(--text3)">${c.points} pts</p>
        </div>
      </div>
      ${openRepair?`
      <div style="margin-top:7px;padding:5px 8px;background:var(--amber-bg);border-radius:6px;font-size:11px;color:var(--amber)">
        🔧 Open repair: ${escH(openRepair.device)} — <span class="font-bold">${STATUS_LABELS[openRepair.status]}</span>
      </div>`:''}
      ${custInvs.length?`<p style="font-size:11px;color:var(--text3);margin-top:5px">${custInvs.length} invoice${custInvs.length!==1?'s':''} · Last: ${fmtDate(custInvs[custInvs.length-1]?.date)}</p>`:''}
    </div>`;
  }).join('');
}

async function pushLocalToCloud(){
  if(!cloudMode){ alert('Cloud not configured.'); return; }
  showCloudBanner('syncing');
  try {
    await Promise.all([
      cloudSet('crm_settings','__settings__', settings),
      cloudSetAll('crm_products', products),
      cloudSetAll('crm_customers', customers),
      cloudSetAll('crm_repairs', repairs),
      cloudSetAll('crm_invoices', invoices),
    ]);
    showCloudBanner('online');
    showAlert('global-alert','✅ All local data pushed to cloud successfully!','green');
  } catch(e){
    showCloudBanner('error', e.message);
    showAlert('global-alert','Cloud push failed: '+e.message,'red');
  }
}
